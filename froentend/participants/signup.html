<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rejoins CodeToWin et lance-toi dans les hackathons." />
    <title>Inscription - CodeToWin</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23059669'/%3E%3Cpath d='M10 22V10h3v4h6v-4h3v12h-3v-5h-6v5z' fill='white'/%3E%3C/svg%3E"
    />
    <!-- Fontshare Satoshi and Google Font Inter -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,800,700,500,400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/signup.css">
  </head>
  <body>
    
    <div class="auth-container">
      <div class="brand-header">
        <a href="home.html">
          <img src="../../assets/brand/codetowin-brand.png" alt="CodeToWin" class="brand-mark" />
        </a>
        <h1 class="auth-title">Rejoins-nous !</h1>
        <p class="auth-subtitle">Crée ton compte et commence à bâtir.</p>
      </div>

      <div class="social-login">
        <button class="btn-social">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continuer avec GitHub
        </button>
        <button class="btn-social">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuer avec Google
        </button>
      </div>

      <div class="divider">ou avec un email, à l'ancienne</div>

      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='home.html';">
        <div class="form-group">
          <label for="username" class="form-label">Pseudo</label>
          <input type="text" id="username" class="form-input" required placeholder="Choisis un pseudo sympa" />
        </div>
        
        <div class="form-group">
          <label for="email" class="form-label">Adresse Email</label>
          <input type="email" id="email" class="form-input" required placeholder="toi@exemple.com" />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Mot de passe</label>
          <input type="password" id="password" class="form-input" required placeholder="Un mot de passe costaud" />
        </div>

        <div class="form-group">
          <label for="password_confirm" class="form-label">Confirme ton mot de passe</label>
          <input type="password" id="password_confirm" class="form-input" required placeholder="Répète-le pour être sûr" />
        </div>

        <button type="submit" class="btn-primary">Je m'inscris !</button>
      </form>

      <div class="auth-footer">
        T'as déjà un compte ? <a href="login.html" class="auth-link">Connecte-toi ici</a>
      </div>
    </div>

  </body>
</html>
